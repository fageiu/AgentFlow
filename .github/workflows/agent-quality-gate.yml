name: Agent Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Test, build and evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm test

      - name: Run type checks
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      # 复用正式 Agent 执行链路；任一 Golden Task 失败或异常都会返回非零退出码。
      - name: Run Mock Golden Task gate
        run: pnpm eval:gate

      - name: Publish evaluation summary
        if: always() && hashFiles('.agentflow-artifacts/mock-evaluation.md') != ''
        run: cat .agentflow-artifacts/mock-evaluation.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-evaluation-report
          path: .agentflow-artifacts/
          if-no-files-found: warn
          retention-days: 14
