name: Agent Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rag-quality:
    name: Python RAG and pgvector integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentflow_rag
          POSTGRES_USER: agentflow
          POSTGRES_PASSWORD: agentflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentflow -d agentflow_rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      RAG_DATABASE_URL: postgresql+asyncpg://agentflow:agentflow@127.0.0.1:5432/agentflow_rag
      RAG_TEST_DATABASE_URL: postgresql+asyncpg://agentflow:agentflow@127.0.0.1:5432/agentflow_rag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.2"
          enable-cache: true
          cache-dependency-glob: apps/rag/uv.lock

      - name: Install locked RAG dependencies
        working-directory: apps/rag
        run: uv sync --frozen --extra dev

      - name: Apply Alembic migrations
        working-directory: apps/rag
        run: uv run alembic upgrade head

      - name: Run Python static checks
        working-directory: apps/rag
        run: uv run ruff check src tests

      # Fake/预置向量保证 CI 不下载 BGE 模型；PostgreSQL 路径仍使用真实 pgvector。
      - name: Run RAG unit and integration tests
        working-directory: apps/rag
        run: uv run pytest -q

  quality-gate:
    name: Test, build and evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm test

      - name: Run type checks
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      # 复用正式 Agent 执行链路；任一 Golden Task 失败或异常都会返回非零退出码。
      - name: Run Mock Golden Task gate
        run: pnpm eval:gate

      - name: Publish evaluation summary
        if: always() && hashFiles('.agentflow-artifacts/mock-evaluation.md') != ''
        run: cat .agentflow-artifacts/mock-evaluation.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-evaluation-report
          path: .agentflow-artifacts/
          if-no-files-found: warn
          retention-days: 14
